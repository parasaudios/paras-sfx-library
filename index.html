
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Para's SFX Library</title>
      <!-- Preconnect to the Supabase API / storage domain so the TLS+DNS
           handshake runs in parallel with HTML parsing. Shaves ~150-300ms
           off the first request for sounds / audio files. -->
      <link rel="preconnect" href="https://sfxlib-api.parasfx.com" crossorigin />
      <link rel="dns-prefetch" href="https://sfxlib-api.parasfx.com" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
