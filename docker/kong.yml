_format_version: "1.1"

###############################################################################
# Kong API Gateway — Para SFX Library
#
# With a custom JWT secret, the service_role key is no longer guessable.
# This config maps the publishable/secret API keys to the correct JWTs,
# and the request-transformer handles Authorization header injection.
###############################################################################

services:
  # ======================= Auth (GoTrue) =======================
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors

  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors

  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  # ======================= REST (PostgREST) =======================
  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  - name: rest-admin-v1
    url: http://rest:3001/
    routes:
      - name: rest-admin-v1-all
        strip_path: true
        paths:
          - /rest-admin/v1/
    plugins:
      - name: cors

  # ======================= GraphQL =======================
  - name: graphql-v1
    url: http://rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Content-Profile: graphql_public"
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  # ======================= Realtime =======================
  - name: realtime-v1-ws
    url: http://realtime:4000/socket
    protocol: ws
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors

  - name: realtime-v1-rest
    url: http://realtime:4000/api
    protocol: http
    routes:
      - name: realtime-v1-rest
        strip_path: true
        paths:
          - /realtime/v1/api
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  # ======================= Storage =======================
  - name: storage-v1-s3
    url: http://storage:5000/s3
    routes:
      - name: storage-v1-s3-all
        strip_path: true
        paths:
          - /storage/v1/s3/
    plugins:
      - name: cors

  - name: storage-v1
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  # ======================= Edge Functions =======================
  - name: functions-v1
    url: http://edge-runtime:8081/
    read_timeout: 150000
    routes:
      - name: functions-v1-all
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors
      - name: request-transformer
        config:
          add:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"
          replace:
            headers:
              - "Authorization: $(headers.authorization or (headers.apikey ~= nil and 'Bearer ' .. headers.apikey) or '')"

  # ======================= Management =======================
  - name: well-known-oauth
    url: http://auth:9999/.well-known/oauth-authorization-server
    routes:
      - name: well-known-oauth
        strip_path: true
        paths:
          - /.well-known/oauth-authorization-server
    plugins:
      - name: cors

  - name: pg-meta
    url: http://meta:8080/
    routes:
      - name: pg-meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: cors

  - name: analytics-v1
    url: http://analytics:4000/
    routes:
      - name: analytics-v1-all
        strip_path: true
        paths:
          - /analytics/v1/
    plugins:
      - name: cors

  - name: mcp
    url: http://studio:3000/api/mcp
    routes:
      - name: mcp
        strip_path: true
        paths:
          - /mcp
    plugins:
      - name: cors
