###############################################################################
# Supabase Self-Hosted — Para SFX Library
#
# Custom JWT secret eliminates the default-key vulnerability.
# All services bind to 127.0.0.1 (localhost only).
# Use the tunnel proxy + Cloudflare Tunnel for public access.
#
# Usage:
#   docker compose up -d
#   docker compose down          (preserves volumes)
#   docker compose down -v       (DELETES ALL DATA — be careful)
###############################################################################

name: para-sfx-library

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # Kong API Gateway
  # ═══════════════════════════════════════════════════════════════════════════
  kong:
    container_name: supabase_kong_Para_SFX_Library
    image: public.ecr.aws/supabase/kong:2.8.1
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-54341}:8000/tcp"
      - "127.0.0.1:8443:8443/tcp"
    depends_on:
      auth:
        condition: service_started
      rest:
        condition: service_started
      storage:
        condition: service_started
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /home/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: request-transformer,cors,key-auth,acl
      KONG_NGINX_PROXY_PROXY_BUFFER_SIZE: 160k
      KONG_NGINX_PROXY_PROXY_BUFFERS: 64 160k
      KONG_PORT_MAPS: "${API_PORT:-54341}:8000"
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
    volumes:
      - ./kong.yml:/home/kong/kong.yml:ro

  # ═══════════════════════════════════════════════════════════════════════════
  # PostgREST
  # ═══════════════════════════════════════════════════════════════════════════
  rest:
    container_name: supabase_rest_Para_SFX_Library
    image: public.ecr.aws/supabase/postgrest:v14.7
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgresql://authenticator:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PGRST_DB_SCHEMAS: public,graphql_public
      PGRST_DB_EXTRA_SEARCH_PATH: public,extensions
      PGRST_DB_MAX_ROWS: 1000
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: '{"keys":[{"kty":"oct","k":"${JWT_SECRET_B64}"}]}'
      PGRST_ADMIN_SERVER_PORT: 3001

  # ═══════════════════════════════════════════════════════════════════════════
  # GoTrue (Auth)
  # ═══════════════════════════════════════════════════════════════════════════
  auth:
    container_name: supabase_auth_Para_SFX_Library
    image: public.ecr.aws/supabase/gotrue:v2.188.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: ${API_EXTERNAL_URL}
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgresql://supabase_auth_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      GOTRUE_SITE_URL: ${SITE_URL}
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: ${DISABLE_SIGNUP:-true}
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_ISSUER: ${API_EXTERNAL_URL}/auth/v1
      GOTRUE_EXTERNAL_EMAIL_ENABLED: true
      GOTRUE_EXTERNAL_PHONE_ENABLED: false
      GOTRUE_MAILER_AUTOCONFIRM: ${ENABLE_EMAIL_AUTOCONFIRM:-false}
      GOTRUE_MAILER_SECURE_EMAIL_CHANGE_ENABLED: true
      GOTRUE_SMTP_HOST: inbucket
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_ADMIN_EMAIL: admin@email.com
      GOTRUE_SMTP_SENDER_NAME: Admin
      GOTRUE_SMTP_MAX_FREQUENCY: 1s
      GOTRUE_MAILER_URLPATHS_CONFIRMATION: ${API_EXTERNAL_URL}/auth/v1/verify
      GOTRUE_MAILER_URLPATHS_INVITE: ${API_EXTERNAL_URL}/auth/v1/verify
      GOTRUE_MAILER_URLPATHS_RECOVERY: ${API_EXTERNAL_URL}/auth/v1/verify
      GOTRUE_MAILER_URLPATHS_EMAIL_CHANGE: ${API_EXTERNAL_URL}/auth/v1/verify
      GOTRUE_PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      GOTRUE_PASSWORD_REQUIRED_CHARACTERS: "abcdefghijklmnopqrstuvwxyz:ABCDEFGHIJKLMNOPQRSTUVWXYZ:0123456789"
      GOTRUE_SECURITY_REFRESH_TOKEN_ROTATION_ENABLED: true
      GOTRUE_SECURITY_REFRESH_TOKEN_REUSE_INTERVAL: 10
      GOTRUE_SECURITY_UPDATE_PASSWORD_REQUIRE_REAUTHENTICATION: true
      GOTRUE_RATE_LIMIT_EMAIL_SENT: 360000
      GOTRUE_RATE_LIMIT_SMS_SENT: 30
      GOTRUE_RATE_LIMIT_ANONYMOUS_USERS: 30
      GOTRUE_RATE_LIMIT_TOKEN_REFRESH: 150
      GOTRUE_RATE_LIMIT_OTP: 30
      GOTRUE_RATE_LIMIT_VERIFY: 30

  # ═══════════════════════════════════════════════════════════════════════════
  # Realtime
  # ═══════════════════════════════════════════════════════════════════════════
  realtime:
    container_name: supabase_realtime_Para_SFX_Library
    image: public.ecr.aws/supabase/realtime:v2.78.18
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "-H", "Authorization: Bearer ${ANON_KEY}", "http://localhost:4000/api/tenants/realtime-dev/health"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: ${POSTGRES_DB}
      DB_AFTER_CONNECT_QUERY: "SET search_path TO _realtime"
      DB_ENC_KEY: supabaserealtime
      API_JWT_SECRET: ${JWT_SECRET}
      SECRET_KEY_BASE: ${JWT_SECRET}
      METRICS_JWT_SECRET: ${JWT_SECRET}
      APP_NAME: realtime
      ERL_AFLAGS: -proto_dist inet_tcp
      ENABLE_TAILSCALE: "false"
      DNS_NODES: "''"
      RLIMIT_NOFILE: 10000
      FLY_APP_NAME: realtime
      FLY_ALLOC_ID: abc123

  # ═══════════════════════════════════════════════════════════════════════════
  # Storage API
  # ═══════════════════════════════════════════════════════════════════════════
  storage:
    container_name: supabase_storage_Para_SFX_Library
    image: public.ecr.aws/supabase/storage-api:v1.44.11
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_started
      imgproxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      POSTGREST_URL: http://rest:3000
      PGRST_JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: postgresql://supabase_storage_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: ${STORAGE_BACKEND:-file}
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      TENANT_ID: stub
      REGION: local
      GLOBAL_S3_BUCKET: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://imgproxy:8080
      IMGPROXY_REQUEST_TIMEOUT: 15
      DATABASE_SEARCH_PATH: storage,public,extensions
    volumes:
      - storage-data:/var/lib/storage

  # ═══════════════════════════════════════════════════════════════════════════
  # Image Proxy
  # ═══════════════════════════════════════════════════════════════════════════
  imgproxy:
    container_name: supabase_imgproxy_Para_SFX_Library
    image: darthsim/imgproxy:v3.8.0
    restart: unless-stopped
    environment:
      IMGPROXY_BIND: ":8080"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
    volumes:
      - storage-data:/var/lib/storage

  # ═══════════════════════════════════════════════════════════════════════════
  # pgMeta
  # ═══════════════════════════════════════════════════════════════════════════
  meta:
    container_name: supabase_pg_meta_Para_SFX_Library
    image: public.ecr.aws/supabase/postgres-meta:v0.96.1
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then(r=>{if(!r.ok)throw Error(r.statusText)})"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      PG_META_PORT: 8080
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: ${POSTGRES_DB}
      PG_META_DB_USER: supabase_admin
      PG_META_DB_PASSWORD: ${POSTGRES_PASSWORD}

  # ═══════════════════════════════════════════════════════════════════════════
  # Studio (Dashboard)
  # ═══════════════════════════════════════════════════════════════════════════
  studio:
    container_name: supabase_studio_Para_SFX_Library
    image: public.ecr.aws/supabase/studio:2026.03.23-sha-b7847b7
    restart: unless-stopped
    ports:
      - "127.0.0.1:${STUDIO_PORT:-54343}:3000/tcp"
    depends_on:
      kong:
        condition: service_started
      meta:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000').then(r=>{if(r.status>=500)process.exit(1)}).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    environment:
      STUDIO_PG_META_URL: http://meta:8080
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DEFAULT_ORGANIZATION_NAME: ${STUDIO_DEFAULT_ORGANIZATION}
      DEFAULT_PROJECT_NAME: ${STUDIO_DEFAULT_PROJECT}
      SUPABASE_URL: http://kong:8000
      SUPABASE_PUBLIC_URL: ${SUPABASE_PUBLIC_URL}
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_URL: http://analytics:4000
      NEXT_PUBLIC_ENABLE_LOGS: true
      NEXT_ANALYTICS_BACKEND_PROVIDER: postgres

  # ═══════════════════════════════════════════════════════════════════════════
  # Edge Runtime
  # ═══════════════════════════════════════════════════════════════════════════
  edge-runtime:
    container_name: supabase_edge_runtime_Para_SFX_Library
    image: public.ecr.aws/supabase/edge-runtime:v1.73.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    command:
      - start
      - --main-service
      - /home/deno/functions/main
    environment:
      JWT_SECRET: ${JWT_SECRET}
      SUPABASE_URL: http://kong:8000
      SUPABASE_ANON_KEY: ${ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      SUPABASE_DB_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SUPABASE_LOCAL: "true"
    volumes:
      - ./functions:/home/deno/functions:ro

  # ═══════════════════════════════════════════════════════════════════════════
  # Inbucket (dev email)
  # ═══════════════════════════════════════════════════════════════════════════
  inbucket:
    container_name: supabase_inbucket_Para_SFX_Library
    image: public.ecr.aws/supabase/mailpit:v1.22.3
    restart: unless-stopped
    ports:
      - "127.0.0.1:${INBUCKET_PORT:-54344}:8025/tcp"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/api/v1/messages?limit=1"]
      interval: 5s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # Analytics (Logflare)
  # ═══════════════════════════════════════════════════════════════════════════
  analytics:
    container_name: supabase_analytics_Para_SFX_Library
    image: public.ecr.aws/supabase/logflare:1.34.14
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ANALYTICS_PORT:-54345}:4000/tcp"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sSfL", "--head", "-o", "/dev/null", "http://localhost:4000/health"]
      interval: 5s
      timeout: 5s
      retries: 3
    environment:
      LOGFLARE_NODE_HOST: 127.0.0.1
      DB_DATABASE: ${POSTGRES_DB}
      DB_HOSTNAME: db
      DB_PORT: 5432
      DB_SCHEMA: _analytics
      DB_USERNAME: supabase_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      LOGFLARE_API_KEY: ${LOGFLARE_API_KEY}
      LOGFLARE_SINGLE_TENANT: true
      LOGFLARE_SUPABASE_MODE: true
      LOGFLARE_MIN_CLUSTER_SIZE: 1
      POSTGRES_BACKEND_URL: postgresql://supabase_admin:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      POSTGRES_BACKEND_SCHEMA: _analytics
      LOGFLARE_FEATURE_FLAG_OVERRIDE: multibackend=true

  # ═══════════════════════════════════════════════════════════════════════════
  # Postgres
  # ═══════════════════════════════════════════════════════════════════════════
  db:
    container_name: supabase_db_Para_SFX_Library
    image: public.ecr.aws/supabase/postgres:17.6.1.095
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-54342}:5432/tcp"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
      - -c
      - log_min_messages=fatal
    environment:
      POSTGRES_HOST: /var/run/postgresql
      PGPORT: 5432
      POSTGRES_PORT: 5432
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXP: 3600
    volumes:
      - db-data:/var/lib/postgresql/data

volumes:
  db-data:
    name: supabase_db_Para_SFX_Library
  storage-data:
    name: supabase_storage_Para_SFX_Library

networks:
  default:
    name: supabase_network_Para_SFX_Library
